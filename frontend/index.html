<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Aset</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body class="login-page">
    <main class="login-shell" x-data="auth()">
        <section class="login-visual" aria-hidden="true">
            <div class="brand-mark">
                <i class="fa-solid fa-cubes-stacked"></i>
            </div>
            <div>
                <p class="eyebrow">Asset Intelligence</p>
                <h1>Kelola aset IT dengan tampilan yang tenang dan terukur.</h1>
                <p class="login-copy">Pantau kategori, lokasi, pengguna, hingga label aset dari satu panel kerja yang lebih rapi.</p>
            </div>
        </section>

        <section class="login-panel">
            <div class="login-card">
                <div class="login-heading">
                    <span class="brand-icon"><i class="fa-solid fa-boxes-stacked"></i></span>
                    <div>
                        <p class="eyebrow">Welcome back</p>
                        <h2>Management Aset</h2>
                    </div>
                </div>

                <form @submit.prevent="submit" class="auth-form">
                    <div class="form-group">
                        <label><i class="fa-solid fa-user"></i> Username</label>
                        <input type="text" class="form-control" x-model="form.username" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-lock"></i> Password</label>
                        <input type="password" class="form-control" x-model="form.password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        Login
                    </button>
                </form>
            </div>
        </section>
    </main>
    <div id="toast" class="toast"></div>
    <script src="./assets/js/script.js"></script>
</body>

</html>
